name: Bug report
description: Report an incorrect detection, deletion plan, or verification result.
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command used
      description: Paste the exact command.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
